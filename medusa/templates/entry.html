<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medusa — We Believe You</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #e8e4d9;
    font-family: 'Crimson Pro', Georgia, serif;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 30px;
  }

  /* ── Medusa background ── */
  #medusa-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.07;
    pointer-events: none;
    overflow: hidden;
  }

  #medusa-bg svg {
    width: 90vmin;
    height: 90vmin;
    filter: drop-shadow(0 0 40px #2d6a4f);
  }

  /* ── Vignette overlay ── */
  #stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(10,10,10,0.7) 70%,
      rgba(10,10,10,0.95) 100%);
    pointer-events: none;
    z-index: 1;
  }

  #content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #logo {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 10px;
    color: #e8e4d9;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  #believe {
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 38px;
    font-weight: 300;
    font-style: italic;
    color: #e8e4d9;
    letter-spacing: 1px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
  }

  #counter-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
  }

  #entry-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: 4px;
  }

  #entry-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #40916c;
    margin-top: 6px;
  }

  #entry-11 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: 3px;
    margin-top: 16px;
  }

  #count-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #40916c;
    margin-top: 8px;
  }

  #warning {
    font-size: 13px;
    color: #5a6b57;
    line-height: 1.7;
    max-width: 320px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 1s ease 1.6s forwards;
  }

  #enter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: transparent;
    color: #e8e4d9;
    border: 1px solid #2d6a4f;
    padding: 14px 40px;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s ease;
    opacity: 0;
    animation: fadeUp 1s ease 2s forwards;
  }

  #enter-btn:hover {
    background: #2d6a4f;
    color: #fff;
    border-color: #40916c;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="stage"><div id="content">
    <div id="logo">MEDUSA</div>
    <div id="believe">We believe victims.</div>

    <div id="counter-wrap">
      <div id="entry-count">10M+</div>
      <div id="entry-sub">WOMEN &amp; CHILDREN EVERY YEAR</div>
      <div id="entry-11">EVERY 11 MIN</div>
      <div id="count-label">a woman is killed by a man</div>
    </div>

    <div id="warning">
      This site documents male violence against women and children
      across the United States using court records, federal databases,
      and public sources. Content may be distressing.
    </div>

    <a href="/map" id="enter-btn">Enter</a>
  </div>
</div>

<script></script>
</body>
</html>
