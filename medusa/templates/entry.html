<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medusa — We Believe You</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #e8e4d9;
    font-family: 'Crimson Pro', Georgia, serif;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 30px;
  }

  /* ── Medusa background ── */
  #medusa-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.07;
    pointer-events: none;
    overflow: hidden;
  }

  #medusa-bg svg {
    width: 90vmin;
    height: 90vmin;
    filter: drop-shadow(0 0 40px #2d6a4f);
  }

  /* ── Vignette overlay ── */
  #stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(10,10,10,0.7) 70%,
      rgba(10,10,10,0.95) 100%);
    pointer-events: none;
    z-index: 1;
  }

  #content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #logo {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 10px;
    color: #e8e4d9;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  #believe {
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 38px;
    font-weight: 300;
    font-style: italic;
    color: #e8e4d9;
    letter-spacing: 1px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
  }

  #counter-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
  }

  #entry-count {
    font-family: 'Space Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -2px;
  }

  #count-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #40916c;
    margin-top: 8px;
  }

  #warning {
    font-size: 13px;
    color: #5a6b57;
    line-height: 1.7;
    max-width: 320px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 1s ease 1.6s forwards;
  }

  #enter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: transparent;
    color: #e8e4d9;
    border: 1px solid #2d6a4f;
    padding: 14px 40px;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s ease;
    opacity: 0;
    animation: fadeUp 1s ease 2s forwards;
  }

  #enter-btn:hover {
    background: #2d6a4f;
    color: #fff;
    border-color: #40916c;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="stage">

  <!-- Medusa SVG — serpent gaze, fierce and beautiful -->
  <div id="medusa-bg">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <!-- Face -->
      <ellipse cx="200" cy="200" rx="90" ry="105" fill="none" stroke="#40916c" stroke-width="1.5"/>
      <!-- Eyes — the gaze -->
      <ellipse cx="172" cy="185" rx="14" ry="10" fill="none" stroke="#b5935a" stroke-width="1.5"/>
      <ellipse cx="228" cy="185" rx="14" ry="10" fill="none" stroke="#b5935a" stroke-width="1.5"/>
      <circle cx="172" cy="185" r="5" fill="#b5935a" opacity="0.6"/>
      <circle cx="228" cy="185" r="5" fill="#b5935a" opacity="0.6"/>
      <!-- Pupil glint -->
      <circle cx="174" cy="183" r="1.5" fill="#fff" opacity="0.8"/>
      <circle cx="230" cy="183" r="1.5" fill="#fff" opacity="0.8"/>
      <!-- Nose -->
      <path d="M200 195 Q193 215 188 220 Q200 225 212 220 Q207 215 200 195" fill="none" stroke="#40916c" stroke-width="1"/>
      <!-- Mouth — set, not soft -->
      <path d="M183 238 Q200 244 217 238" fill="none" stroke="#40916c" stroke-width="1.5"/>
      <!-- Serpents — hair -->
      <!-- Serpent 1 -->
      <path d="M148 130 Q120 90 95 110 Q80 125 100 140 Q115 150 105 165" fill="none" stroke="#2d6a4f" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="104" cy="168" rx="5" ry="3" fill="#2d6a4f" transform="rotate(-20 104 168)"/>
      <path d="M99 166 L104 172 M109 166 L104 172" stroke="#2d6a4f" stroke-width="1"/>
      <!-- Serpent 2 -->
      <path d="M165 115 Q155 75 130 70 Q110 68 115 90 Q118 105 105 112" fill="none" stroke="#40916c" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="103" cy="115" rx="5" ry="3" fill="#40916c" transform="rotate(-40 103 115)"/>
      <!-- Serpent 3 -->
      <path d="M185 108 Q180 65 160 52 Q142 42 140 62 Q140 78 125 82" fill="none" stroke="#2d6a4f" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="123" cy="85" rx="5" ry="3" fill="#2d6a4f" transform="rotate(-60 123 85)"/>
      <!-- Serpent 4 right -->
      <path d="M252 130 Q280 90 305 110 Q320 125 300 140 Q285 150 295 165" fill="none" stroke="#2d6a4f" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="296" cy="168" rx="5" ry="3" fill="#2d6a4f" transform="rotate(20 296 168)"/>
      <path d="M291 166 L296 172 M301 166 L296 172" stroke="#2d6a4f" stroke-width="1"/>
      <!-- Serpent 5 right -->
      <path d="M235 115 Q245 75 270 70 Q290 68 285 90 Q282 105 295 112" fill="none" stroke="#40916c" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="297" cy="115" rx="5" ry="3" fill="#40916c" transform="rotate(40 297 115)"/>
      <!-- Serpent 6 right -->
      <path d="M215 108 Q220 65 240 52 Q258 42 260 62 Q260 78 275 82" fill="none" stroke="#2d6a4f" stroke-width="2" stroke-linecap="round"/>
      <!-- Crown/top serpents -->
      <path d="M200 95 Q200 55 185 40 Q175 28 180 15" fill="none" stroke="#b5935a" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M200 95 Q205 50 220 38 Q232 28 228 14" fill="none" stroke="#b5935a" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Neck -->
      <path d="M170 300 Q180 320 200 325 Q220 320 230 300" fill="none" stroke="#40916c" stroke-width="1.5"/>
      <!-- Shoulders suggested -->
      <path d="M115 310 Q145 295 170 300" fill="none" stroke="#2d6a4f" stroke-width="1"/>
      <path d="M285 310 Q255 295 230 300" fill="none" stroke="#2d6a4f" stroke-width="1"/>
      <!-- Outer glow rings -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="#2d6a4f" stroke-width="0.5" opacity="0.4"/>
      <circle cx="200" cy="200" r="160" fill="none" stroke="#1b4332" stroke-width="0.3" opacity="0.3"/>
    </svg>
  </div>

  <div id="content">
    <div id="logo">MEDUSA</div>
    <div id="believe">We believe you.</div>

    <div id="counter-wrap">
      <div id="entry-count">{{ total }}</div>
      <div id="count-label">Cases Documented and Growing</div>
    </div>

    <div id="warning">
      This site documents male violence against women and children
      across the United States using court records, federal databases,
      and public sources. Content may be distressing.
    </div>

    <a href="/map" id="enter-btn">Enter</a>
  </div>
</div>

<script>
// Animate counter
const target = {{ total }};
const el = document.getElementById('entry-count');
if (target > 0) {
  let current = 0;
  const duration = 2000;
  const increment = Math.ceil(target / (duration / 16));
  const timer = setInterval(() => {
    current = Math.min(current + increment, target);
    el.textContent = current.toLocaleString();
    if (current >= target) clearInterval(timer);
  }, 16);
}
</script>
</body>
</html>
