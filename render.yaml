services:
  - type: web
    name: medusa
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medusa-db
          property: connectionString

databases:
  - name: medusa-db
    databaseName: medusa
    user: medusa
